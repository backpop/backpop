; Minimal ini for tests — low-mass stars (MS lifetime >> tphys=10 Myr)
; so the phase_condition kstar_1==1 & kstar_2==1 is reliably met.
[backpop]
n_threads = 1
n_eff = 50
n_live = 50
verbose = False
output_folder =
resume = False
use_bcm = False
phase_condition = kstar_1 == 1 & kstar_2 == 1
bpp_columns =
bcm_columns =
n_bpp_rows =

[backpop.obs::m1]
mean = 10.0
sigma = 1.0
out_name = mass_1

[backpop.obs::m2]
mean = 5.0
sigma = 0.5
out_name = mass_2

[backpop.obs::tb]
mean = 100.0
sigma = 10.0
out_name = porb

[backpop.obs::e]
mean = 0.2
sigma = 0.02
out_name = ecc

[backpop.fixed::metallicity]
value = 0.001

[backpop.fixed::tphys]
value = 10.0

[backpop.var::m1]
min = 5.0
max = 20.0

[backpop.var::m2]
min = 2.0
max = 8.0

[backpop.var::tb]
min = 5.0
max = 1000.0

[backpop.var::e]
min = 0.0
max = 0.9

[bse]
pts1 = 0.001
